body:
  text: 太清元道真經卷中人者萬物之中至靈者也與天地同生於虛無之始因元氣結而成形形體既立十天之神降入身中為人神故能成人也既與天地同生於虛無之始則合與天地齊壽今天地則能長久人不能長存者何也蓋天地能安靜和柔不移於本性常守虛無湛然不勞得自然之道元氣不散故也人不能長存者緣生妄想移於本性不執自然不守其根自取其勞又常求自益故元氣消散弗得長存也因六賊妄生目妄視耳妄聽鼻妄香臭口妄言味身妄作役意妄思慮故終不歸根也故曰歸根則可以永存而長生也夫真一之道可以永存歸根者復元氣之本也復元氣之道非他也湛而巳人能常歸心湛則元氣自然而復也復元氣之應常以減息為候心源湛其息漸減減半息增半壽從減息至無息則復元歸根矣乃可住世凡人以有息為常聖人以無息為常動而有息靜而無息故有息無息自在也元道之士常宜以無息為常有息為妄無息為是有息為非湛然養氣三靈歡然三魂暢然神魂歡暢則元氣自復矣黃庭道三十六慎一應至三十六應乃為半功又諸道應慎皆多此無上道總一慎三應則成功也一慎者慎其休止耳不休止則可至元道三應者三轉意也每一轉意一百日第一轉意應一百日有事無事皆可減息為第一轉意謂初則有事止無事乃可行是則塵慮息減虛恬日增為第一轉應也小功成矣第二轉意應二百日忽忽自止為第二轉意也至是則不嗜穀味無大飢渴為第二轉應也中功成矣第三轉意應三百日兀然自住為第三轉意也至是則飢渴不至寒暑不侵死籍永除天地齊壽為第三轉應矣通用三十一周曰大功成矣大君曰有事無事皆可減者功萌也有事無事皆可減者元氣漸復也忽忽自止者元氣將定也兀然自住者元氣歸根而定也大君曰從減息至無息從無息至定此定不取不捨無為之定非執定之定如得此定者陰陽自調四時自離元氣自滿衆神自栖能通玄奧故陰陽調則百痾不生四時離則無暄涼寒暑元氣滿則無飢渴衆神棲則兵虎不能害慧通玄奧則萬事不生大君曰人之思慮不一者元氣散也此道功成無妄發動所發無不善所用無不中故非中不用非用不發故有善發慧發通發皆自然而然也故無喜怒欲爭哀懼愛惡之發也大君曰長生非他也神全氣全形全而巳矣神全者樂虛無喜清靜湛然氣和而神自全矣元氣充積形神永存矣神氣皆全故舉形而仙焉住氣兼行功經曰調氣減息其功若是住氣兼行功又倍之住氣者候神氣安恬因而住之至極為一通每能雞鳴前可行五六通漸加至十通如此行減息之道功倍速矣慎吐引大奔初不能免且慎奔吐終宜俱微大君曰住氣可以通百關開堅滯理萬疾導元氣百關通則疾減之元氣隨所通則津路流注元氣津液所及之處則永不壞矣則謂之金髓玉骨長生而仙大君曰減息住氣皆以無息定氣為成功若獨行減息則功遲專行住氣則難以至無息若通百關而兼減息則元氣易充盈其功倍矣太清元道真經卷中
