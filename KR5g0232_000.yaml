body:
  text: 太清元道真經序元道者玄元之上道黃老之心祕也元和中孟謫仙降世其胎親皆積至誠醇厚謫仙又至慈敦孝先感東山陶大通君先示死生之變因命執本根焉本根即元道也次感南統樊大君戊戌歲降之口授此經故皆大紀樞要直指長生久視之道蓋黃庭云至道不煩矣
