body:
  text: 太清元道真經卷上元道者太上老君之無上道也老君道有三上中下也黃庭道有三上中下也又諸道各有三皆其次也老君中道與黃庭上道比諸道又次比之元道有三此經又其最上者故曰無上元道也此道至高虛無玄妙淡泊無為動合自然故學者難親焉若非上士機高倏然玄悟不可也非謹懼於死攀向於生者不可也諸中道下道多慕上而行者此道難合故久不降焉若機高上士特然行之則自得無量也謂虛恬無量通易無量暢適無量也又諸道皆有師奉皆明犯罰此道無諸師奉故無罰也諸道皆須擇山處靜或别處草庵乃可行之不然有損唯此道可塵世成之經曰鼻引口吐可去浮寒虛熱不可排積元氣也注氣可以通百關理萬病非養氣復元也咽氣可以救飢劣非自然充積也行氣可以潤脈悅膚非常道也此道歸根復命之道故曰元道如堅筋補髓固護五藏清利泥丸安住丹靈六不妄入三不妄出纖濁盡去真氣倘佯騰太虛蔚玉清上為真君者皆此道也太清元道真經卷上
