body:
  text: 元道者玄元之上道黃老之心秘也元和中孟謫仙降世其胎親皆積至誠醕厚謫仙又至慈敦孝先感東山陶大通君先示死生之變因命執本根焉本根卽元道也次感南統樊大君戊戌嵗降之口授此經故皆大紀樞要直指長生久視之道蓋黃庭云至道不煩矣太清元道眞經卷上
