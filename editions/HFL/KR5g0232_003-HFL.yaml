body:
  text: 太清元道真經卷下但示其首篇之目不見其文遒成將舉乃可見矣言其報功耳其功一其報萬大約如茅君九錫此乃上道又百倍之學元道者无辭勤矣下眷首目約數十篇後聖所紀者五篇而巳功報一志報二不退報三不妄報四不須捨報五元道别録元道无他所慎休止而不休止萬非无所措矣塵世士或難常行時有休止休止之中不可不慎今録戒慎於後爲暫休止者言矣慎一大息二小乏三日減三十日十五大息爲一小乏大乏減六十日三十大息爲一大乏一忿減十日一小醉減五十日一大醉減百日一哀減十日一嗔減二十日一懼減七日一怒減三十日一飢減三日一飽減五日一犯慾減五十日一驚減十日一勞一倦皆減五日又飮食觸忌寒熱過差風濕所及起居失節言語散雜思慮煩躁此皆損元炁隨所觸犯輕重所減凢言犯減者皆減其實功耳元道之士深冝慎之元炁難積而易散關節易閉而難通住炁固不可絶所得深冝愛惜此經從太古太上老君傳血脉相付一十九人而絶皆巳登仙位品居尊極其經不留世至唐開元戊戌歲南統樊大君口授孟謫仙孟謫仙又口傳王虛无虛无爲立三篇參述元道之機要焉太清元道真經卷下
