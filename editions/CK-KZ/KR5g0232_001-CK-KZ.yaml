body:
  text: 元道者太上老君之无上道也老君道有三上中下也黃庭道有三上中下也又諸道各有三皆其次也老君中道與黃庭上道比諸道又次比之元道有三此經又其最上者故曰无上元道也此道至高虛无玄妙澹泊无爲動合自然故學者難親焉若非上士機高翛然玄悟不可也非謹懼於死攀向於生者不可也諸中道下道多慕上而行者此道難合故久不降焉若機高上士特然行之則自得无量也謂虛恬无量通易无量暢適无量也又諸道皆有師奉皆明犯罰此道無諸師奉故无罰也諸道皆須擇山處靜或别處草庵乃可行之不然有損唯此道可塵世成之經曰鼻引口吐可去浮寒虛熱不可排積元炁也
