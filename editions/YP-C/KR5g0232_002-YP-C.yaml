body:
  text: 注氣可以通百關理萬病非養炁復元也咽炁可以救飢劣非自然充積也行炁可以潤脉悅膚非常道也此道歸根復命之道故曰元道如堅筋補髓固護五藏清利泥丸安住丹靈六不妄入三不妄出纖濁盡去眞氣倘佯騰太虛蔚玉清上爲眞君者皆此道也太清元道眞經卷中人者萬物之中至靈者也與天地同生於虛无之始因元炁結而成形形體旣立十天之神降入身中爲人神故能成人也旣與天地同生於虛无之始則合與天地齊壽今天地則能長久人不能長存者何也蓋天地能安靜和柔不移於本性常守虛无湛然不勞得自然之道元炁不散故也人不能長存者緣生妄想移於本性不執自然不守其根自取其勞又常求自益故元炁消散弗得長存也因六賊妄生目妄視耳妄聽鼻妄香臭口妄言味身妄作役意妄思慮故終不歸根也故曰歸根則可以永存而長生也夫眞一之道可以永存歸根者復元炁之本也復元炁之道非他也湛寂而已人能常歸心湛寂則元炁自然而復也復元炁之應常以減息爲候心源湛寂其息漸減減半息增半壽從減息至无息則復元歸根矣乃可住世凡人以有息爲常聖人以无息爲常動而有息靜而無息故有息无息自在也元道之士常宜以無息爲常有息爲妄無息爲是有息爲非湛然養炁三靈歡然三魂暢然神魂歡暢則元炁自復矣黃庭道三十六愼一應至三十六應乃爲半功又諸道應愼皆多此无上道總一愼三應則成功也一愼者愼其休止耳不休止則可至元道三應者三轉意也每一轉意一百日第一轉意應一百日有事無事皆可減息爲第一轉意謂初則有事止无事乃可行是則塵慮息減虛恬日增爲第一轉應也小功成矣第二轉意應二百日忽忽自止爲第二轉意也至是則不嗜穀味无大飢渴爲第二轉應也中功成矣第三轉意應三百日兀然自住爲第三轉意也至是則飢渴不至寒暑不侵死籍永除天地齊壽爲第三轉應矣通用三十一周曰大功成矣大君曰有事无事皆可減者功萌也有事無事皆可減者元炁漸復也忽忽自止者元炁將定也兀然自住者元炁歸根而定也大君曰從減息至无息從无息至定此定不取不捨无爲之定非執定之定如得此定者陰陽自調四時自離元炁自滿眾神自棲能通玄奥故陰陽調則百痾不生四時離則無暄涼寒暑元炁滿則无飢渴眾神棲則兵虎不能害慧通玄奥則萬事不生大君曰人之思慮不一者元炁散也此道功成无妄發動所發无不善所用无不中故非中不用非用不發故有善發慧發通發皆自然而然也故无喜怒欲爭哀懼愛惡之發也大君曰長生非他也神全炁全形全而已矣神全者樂虛无喜清靜湛然炁和而神自全矣元炁充積形神永存矣神炁皆全故舉形而仙焉住炁兼行功經曰調炁減息其功若是住炁兼行功又倍之住炁者候神炁安恬因而住之至極爲一通每能雞鳴前可行五六通漸加至十通如此行減息之道功倍速矣愼吐引大奔初不能免且愼奔吐終宜俱微大君曰住炁可以通百關開堅滯理萬疾導元炁百關通則疾減之元炁隨所通則津路流注元炁津液所及之處則永不壞矣則謂之金髓玉骨長生而仙
